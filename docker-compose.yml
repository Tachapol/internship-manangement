services:
  postgres:
    image: postgres:15-alpine
    container_name: devplus-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: devplus
      POSTGRES_USER: devplus_user
      POSTGRES_PASSWORD: devplus_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devplus_user -d devplus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
